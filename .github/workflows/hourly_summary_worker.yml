name: Gezo Gundem Saatlik Ozet

on:
  workflow_dispatch:

# 🔥 YENİ: Concurrency Koruması eklendi.
# Aynı anda iki workflow tetiklenirse, çakışmayı önlemek için sıraya koyar.
concurrency:
  group: hourly-summary
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-hourly-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # ⚡ Bağımlılıkları önbelleğe alarak hızı artırır

      - name: FFmpeg Kur
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🔥 DÜZELTME: Google Cloud Kimlik Bilgilerini env üzerinden aktararak güvenliği artırma
      - name: Google Cloud Kimlik Bilgilerini Olustur
        env:
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
        run: echo "$GCP_CREDENTIALS_JSON" > gcp_auth.json

      - name: Saatlik Ozeti Hazirla
        env:
          PYTHONUNBUFFERED: "1" 
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: gcp_auth.json # Python kütüphanesi bu env değerini otomatik okur
        run: python scripts/hourly_summary.py

      - name: R2'ye Yukle
        if: hashFiles('cdn_data/summaries/.upload_ready') != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp cdn_data/summaries/hourly_latest.json s3://gezo-data/hourly_summary.json --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com --no-progress
          aws s3 cp cdn_data/summaries/seen_links_cache.json s3://gezo-data/seen_links_cache.json --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com --no-progress

          # 🔥 DÜZELTME: mp3 dosyaları sadece bu run'da gerçekten üretildiyse (has_changes=true) var olur.
          if [ -f cdn_data/summaries/summary_male.mp3 ]; then
            aws s3 cp cdn_data/summaries/summary_male.mp3 s3://gezo-data/summary_male.mp3 --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com --no-progress
          else
            echo "ℹ️ summary_male.mp3 bu run'da üretilmedi, upload atlandı."
          fi

          if [ -f cdn_data/summaries/summary_female.mp3 ]; then
            aws s3 cp cdn_data/summaries/summary_female.mp3 s3://gezo-data/summary_female.mp3 --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com --no-progress
          else
            echo "ℹ️ summary_female.mp3 bu run'da üretilmedi, upload atlandı."
          fi

      - name: Guncel Main'i Cek
        if: hashFiles('cdn_data/summaries/.upload_ready') != ''
        run: |
          git fetch origin main
          git rebase origin/main --autostash

      - name: Github'a Pushla
        if: hashFiles('cdn_data/summaries/.upload_ready') != ''
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat(cdn): Ozet, cache ve ses dosyalari guncellendi"
          file_pattern: 'cdn_data/summaries/*.json cdn_data/summaries/*.mp3'

      - name: Cloudflare Cache Temizle (Purge)
        if: hashFiles('cdn_data/summaries/.upload_ready') != ''
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
               -H "Authorization: Bearer ${{ secrets.CF_PURGE_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data '{
                 "files": [
                   "https://api.gezoist.com/summary_male.mp3",
                   "https://api.gezoist.com/summary_female.mp3",
                   "https://api.gezoist.com/hourly_latest.json",
                   "https://api.gezoist.com/latest.json"
                 ]
               }'
name: Gezo Gundem Saatlik Ozet

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-hourly-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # ⚡ Bağımlılıkları önbelleğe alarak hızı artırır

      - name: Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Saatlik Ozeti Hazirla
        env:
          PYTHONUNBUFFERED: "1"  # 🔥 YENİ: Logları saniye saniye ekrana bas!
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/hourly_summary.py

      - name: R2'ye Yukle
        if: hashFiles('cdn_data/summaries/.upload_ready') != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp cdn_data/summaries/hourly_latest.json s3://gezo-data/hourly_summary.json --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com --no-progress
          aws s3 cp cdn_data/summaries/seen_links_cache.json s3://gezo-data/seen_links_cache.json --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com --no-progress

      - name: Github'a Pushla
        if: hashFiles('cdn_data/summaries/.upload_ready') != ''
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat(cdn): Saatlik ozet ve link cache guncellendi"
          file_pattern: 'cdn_data/summaries/*.json'
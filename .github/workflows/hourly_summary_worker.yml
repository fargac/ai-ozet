name: Gezo Gundem Saatlik Ozet

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-hourly-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # YENİ: beautifulsoup4 ve requests kütüphaneleri eklendi
      - name: Kutuphaneleri Yukle
        run: pip install google-genai feedparser python-dateutil beautifulsoup4 requests

      - name: Saatlik Ozeti Hazirla
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CDN_JSON_URL: "https://api.gezoist.com/hourly_latest.json"
        run: python scripts/hourly_summary.py

      # YENİ: Sadece .upload_ready dosyası varsa (yani gündem değiştiyse) R2'ye yükle
      - name: R2'ye Yukle
        if: hashFiles('cdn_data/summaries/.upload_ready') != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp cdn_data/summaries/hourly_latest.json s3://gezo-data/hourly_summary.json --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com --no-progress

      # YENİ: Sadece gündem değiştiyse GitHub'a commit at
      - name: Github'a Pushla
        if: hashFiles('cdn_data/summaries/.upload_ready') != ''
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat(cdn): Saatlik ozet (hourly_summary.json) guncellendi"
          file_pattern: 'cdn_data/summaries/hourly_latest.json'